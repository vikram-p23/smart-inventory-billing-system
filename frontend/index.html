<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RetailOS — Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div class="a-logo-icon">🏪</div>
      <h1 class="a-title" style="margin-top:11px">RetailOS</h1>
      <p class="a-sub">Complete Store Management</p>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <!-- LOGIN -->
    <div id="login-panel" class="tab-panel active">
      <form onsubmit="handleLogin(event)">
        <div class="fg"><label class="fl">Email</label><input type="email" id="l-email" class="fc" placeholder="admin@store.com" required></div>
        <div class="fg"><label class="fl">Password</label><input type="password" id="l-pass" class="fc" placeholder="••••••••" required></div>
        <button type="submit" id="l-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px">
          <span id="l-spin" class="spin hidden"></span> Sign In
        </button>
      </form>
      <div style="background:var(--bg-secondary);border:1px solid var(--b1);border-radius:var(--rm);padding:12px 13px;margin-top:14px;font-size:.78rem;color:var(--t2)">
        <strong style="color:var(--accent)">🔑 Demo Mode</strong> — No backend yet? Enter the app with mock data to explore all features.
        <br><br><button class="btn btn-secondary btn-sm" onclick="demoLogin()" style="width:100%;justify-content:center">Enter Demo Mode</button>
      </div>
    </div>
    <!-- SIGNUP -->
    <div id="signup-panel" class="tab-panel">
      <form onsubmit="handleSignup(event)">
        <div class="fg"><label class="fl">Full Name</label><input type="text" id="s-name" class="fc" placeholder="Rahul Sharma" required></div>
        <div class="fg"><label class="fl">Email</label><input type="email" id="s-email" class="fc" placeholder="you@store.com" required></div>
        <div class="fg"><label class="fl">Password</label><input type="password" id="s-pass" class="fc" placeholder="Min 8 characters" minlength="8" required></div>
        <div class="fg"><label class="fl">Store Name</label><input type="text" id="s-store" class="fc" placeholder="My Retail Store" required></div>
        <button type="submit" id="s-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px">
          <span id="s-spin" class="spin hidden"></span> Create Account
        </button>
      </form>
    </div>
  </div>
</div>
<div id="toast-ct"></div>
<script src="app.js"></script>
<script>
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('login-panel').classList.toggle('active',t==='login');
  document.getElementById('signup-panel').classList.toggle('active',t==='signup');
}
async function handleLogin(e) {
  e.preventDefault();
  const btn=document.getElementById('l-btn'), sp=document.getElementById('l-spin');
  btn.disabled=true; sp.classList.remove('hidden');
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST', headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY},
      body:JSON.stringify({email:document.getElementById('l-email').value, password:document.getElementById('l-pass').value})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description||'Login failed');
    Auth.setUser(data.user, data.access_token);
    Toast.success('Welcome back!','Redirecting…');
    setTimeout(()=>window.location.href='dashboard.html',700);
  } catch(err){ Toast.error('Login Failed', err.message); }
  finally{ btn.disabled=false; sp.classList.add('hidden'); }
}
async function handleSignup(e) {
  e.preventDefault();
  const sp=document.getElementById('s-spin'); sp.classList.remove('hidden');
  try {
    const res = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/signup`,{
      method:'POST', headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY},
      body:JSON.stringify({email:document.getElementById('s-email').value, password:document.getElementById('s-pass').value,
        data:{full_name:document.getElementById('s-name').value}})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description||'Signup failed');
    Toast.success('Account Created!','Check your email to verify.');
    setTimeout(()=>switchTab('login'),1500);
  } catch(err){ Toast.error('Signup Failed', err.message); }
  finally{ document.getElementById('s-spin').classList.add('hidden'); }
}
function demoLogin() {
  Auth.setUser({email:'demo@retailos.com',id:'demo',role:'admin'},'demo-token');
  Toast.info('Demo Mode','Loading sample store data…');
  setTimeout(()=>window.location.href='dashboard.html',600);
}
document.addEventListener('DOMContentLoaded',()=>{ if(Auth.getUser()) window.location.href='dashboard.html'; });
</script>
</body></html>
